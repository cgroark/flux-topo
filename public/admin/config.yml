backend:
  name: git-gateway
  branch: master

# For username/password auth (no GitHub required)
site_url: https://flux-topo.netlify.app
display_url: https://flux-topo.netlify.app

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "sections"
    label: "Page Sections"
    files:
      - label: "Hero Section"
        name: "hero"
        file: "src/content/sections/hero.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string", required: false }
          - { label: "Button Text one", name: "button_one", widget: "string", required: false }
          - { label: "Button Text two", name: "button_two", widget: "string", required: false }

      - label: "About Section"
        name: "about"
        file: "src/content/sections/about.md"
        fields:
          - label: "Overview"
            name: "overview"
            widget: "list"
            fields:
              - { label: "Text", name: "text", widget: "text" }
              - { label: "Italic", name: "italic", widget: "boolean", required: false, default: false }
              - { label: "Emphasis", name: "emphasis", widget: "boolean", required: false, default: false }
          - label: "Images"
            name: "images"
            widget: "list"
            fields:
              - {label: "Full Image", name: "full_image", widget: "image" }

      - label: "Contact Section"
        name: "contact"
        file: "src/content/sections/contact.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Text Section", name: "textSection", widget: "string" }
          - { label: "Email Text", name: "emailString", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Image", name: "logo", widget: "image", required: false }

      - label: "Footer Section"
        name: "footer"
        file: "src/content/sections/footer.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Copyright", name: "copyright", widget: "string" }
          - { label: "Owner", name: "owner", widget: "string" }
          - { label: "Owner link", name: "ownerLink", widget: "string"}

  - name: "navigation"
    label: "Navigation"
    files:
      - label: "Main Navigation"
        name: "main-nav"
        file: "src/content/navigation/main.md"
        fields:
          - { label: "Logo", name: "logo", widget: "image" }

          - label: "Navigation Items"
            name: "nav_items"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string", required: false }
              - { label: "Link", name: "href", widget: "string" }
